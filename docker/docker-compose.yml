version: "3.9"

services:

  # =========================================================
  # POSTGRES (AIRFLOW METADATA)
  # =========================================================
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"

  # =========================================================
  # AIRFLOW INIT
  # =========================================================
  airflow-init:
    build: .
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create
        --username airflow
        --password airflow
        --firstname airflow
        --lastname admin
        --role Admin
        --email admin@admin.com || true
      "

  # =========================================================
  # AIRFLOW WEBSERVER
  # =========================================================
  airflow-webserver:
    build: .
    restart: always
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      #AIRFLOW_CONN_SNOWFLAKE_DEFAULT: ${AIRFLOW_CONN_SNOWFLAKE_DEFAULT}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ../logs:/opt/airflow/logs
      - ../sql:/opt/airflow/sql
    command: webserver

  # =========================================================
  # AIRFLOW SCHEDULER
  # =========================================================
  airflow-scheduler:
    build: .
    restart: always
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      #AIRFLOW_CONN_SNOWFLAKE_DEFAULT: ${AIRFLOW_CONN_SNOWFLAKE_DEFAULT}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ../logs:/opt/airflow/logs
      - ../sql:/opt/airflow/sql
    command: scheduler

  # =========================================================
  # AIRFLOW TRIGGERER (SAFE ADD-ON)
  # =========================================================
  airflow-triggerer:
    build: .
    restart: always
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      #AIRFLOW_CONN_SNOWFLAKE_DEFAULT: ${AIRFLOW_CONN_SNOWFLAKE_DEFAULT}
    command: triggerer

networks:
  default: