version: 2

sources:
  - name: raw
    database: CLIENT_DATA_PLATFORM
    schema: RAW

    tables:
      - name: orders
        description: "Raw orders ingested from ERP provider"
        columns:
          - name: order_id
            tests:
              - not_null
              

          - name: customer_id
            tests:
              - not_null

          - name: product_code
            tests:
              - not_null

          - name: updated_at
            tests:
              - not_null